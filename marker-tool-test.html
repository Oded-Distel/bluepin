<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BluePin – סימון תכניות</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: -apple-system, "Arial Hebrew", Arial, sans-serif; background: #f0f0f0; }
  header {
    background: #222; color: #fff; padding: 10px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; margin-left: 10px; }
  header button, header label.fake-btn {
    padding: 8px 14px; border: 0; border-radius: 5px; cursor: pointer; font-size: 14px;
    font-weight: bold;
  }
  .btn-upload   { background: #5a5; color: #fff; }
  .btn-add-wb   { background: #d40; color: #fff; }
  .btn-add-cam  { background: #06d; color: #fff; }
  .btn-add-cable{ background: #a0a; color: #fff; }
  .btn-export   { background: #2a2; color: #fff; }
  .btn-import   { background: #888; color: #fff; }
  .btn-clear    { background: #444; color: #fff; }
  .btn-render   { background: #f80; color: #fff; }
  .mode-active  { outline: 3px solid #fff; outline-offset: 1px; }

  main { display: flex; gap: 8px; padding: 8px; height: calc(100vh - 110px); }
  .panel {
    flex: 1; background: #fff; border: 1px solid #ccc;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel h3 {
    margin: 0; padding: 6px 10px; background: #eee; font-size: 13px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .canvas-wrap {
    flex: 1; overflow: auto; position: relative;
    background: repeating-linear-gradient(45deg, #fafafa 0 10px, #f4f4f4 10px 20px);
  }
  .img-wrap { position: relative; display: inline-block; cursor: crosshair; }
  .img-wrap img { display: block; user-select: none; -webkit-user-drag: none; }
  #cableLayer {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  #cableLayer line { stroke: #000; stroke-width: 3; pointer-events: stroke; cursor: pointer; }
  #cableLayer line:hover { stroke: #f0f; stroke-width: 5; }

  .marker {
    position: absolute; transform: translate(-50%, -50%);
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .marker.wb {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(220,30,30,0.85);
    border: 3px solid #b00;
    cursor: move;
  }
  .marker.cam {
    width: 44px; height: 44px;
    cursor: move;
  }
  .marker.cam svg { width: 100%; height: 100%; overflow: visible; }
  .marker .label {
    position: absolute; top: 110%; left: 50%; transform: translateX(-50%);
    white-space: nowrap; background: rgba(255,255,255,0.9);
    padding: 2px 6px; border-radius: 3px; font-size: 13px;
    border: 1px solid currentColor;
  }
  .marker.wb .label { color: #b00; }
  .marker.cam .label { color: #06b; }
  .marker .x {
    position: absolute; top: -10px; right: -10px; background: #000; color: #fff;
    width: 18px; height: 18px; border-radius: 50%; font-size: 12px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    z-index: 5;
  }
  .marker .rot-handle {
    position: absolute;
    width: 12px; height: 12px;
    background: #fff; border: 2px solid #06b; border-radius: 50%;
    cursor: grab;
    z-index: 4;
  }
  .marker .cable-handle {
    position: absolute;
    width: 14px; height: 14px;
    background: rgba(170, 0, 170, 0.85); border: 2px solid #fff;
    border-radius: 50%;
    cursor: crosshair;
    z-index: 6;
    box-shadow: 0 0 0 1px #a0a;
  }
  .marker .cable-handle:hover { background: #f0f; transform: scale(1.15); }
  .marker.wb.cable-target { outline: 4px solid #a0a; outline-offset: 2px; border-radius: 50%; }
  .marker.cable-from { outline: 4px solid #f0f; outline-offset: 2px; border-radius: 50%; }

  #zoomControls { display: flex; gap: 6px; padding: 4px 8px; background: #eee; font-size: 12px;}
  #zoomControls button { padding: 2px 8px; cursor: pointer; }
  .legend-side {
    flex: 0 0 320px; background: #fff; border: 1px solid #ccc; padding: 10px;
    overflow-y: auto;
  }
  .legend-side h3 { margin: 0 0 8px 0; font-size: 14px; }
  .legend-side ul { padding: 0 16px 0 0; margin: 0; list-style: none; }
  .legend-side ul { padding: 0; margin: 0; list-style: none; }
  .legend-side button { font-size: 11px; padding: 2px 6px; cursor: pointer; }

  .section-header {
    font-size: 13px; font-weight: bold; color: #fff;
    padding: 6px 10px; margin: 12px 0 6px 0;
    border-radius: 4px; list-style: none; display: block;
  }
  .section-header:first-child { margin-top: 0; }
  .section-header.sh-wb  { background: #c33; }
  .section-header.sh-cam { background: #06b; }

  .marker-card {
    margin-bottom: 8px; border-radius: 6px;
    border: 1px solid #ddd; background: #fff;
    overflow: hidden;
  }
  .marker-card.wb-card  { background: #fff7f7; border-color: #fbd2d2; }
  .marker-card.cam-card { background: #f4f9ff; border-color: #cfe0f5; }
  .marker-card .card-head {
    display: flex; flex-direction: column; gap: 2px;
    padding: 6px 8px;
  }
  .marker-card.wb-card .card-head  { border-right: 4px solid #c33; }
  .marker-card.cam-card .card-head { border-right: 4px solid #06b; }
  .marker-card .name {
    font-weight: bold; font-size: 14px;
  }
  .marker-card.wb-card  .name { color: #b00; }
  .marker-card.cam-card .name { color: #06b; }
  .marker-card .meta { font-size: 10px; color: #999; }
  .marker-card .actions { display: flex; gap: 4px; margin-top: 2px; }
  .marker-card .actions button {
    background: #fff; border: 1px solid #ccc; padding: 1px 6px;
    font-size: 11px; border-radius: 3px;
  }
  .marker-card .actions button:hover { background: #f0f0f0; }

  .marker-card.wb-card { display: grid; grid-template-columns: 130px 1fr; }
  .marker-card.wb-card .contents-list {
    padding: 6px 8px; border-right: 1px dashed #eecccc;
    font-size: 12px; color: #333;
    list-style: none; margin: 0;
  }
  .marker-card.wb-card .contents-list li {
    padding: 2px 0; border: 0; display: block;
  }
  .marker-card.wb-card .contents-list .item-name { color: #222; }
  .marker-card.wb-card .contents-list .item-qty  { color: #999; font-size: 11px; margin-right: 4px; }
  .marker-card.wb-card .contents-list .empty {
    color: #b88; font-style: italic; font-size: 11px;
  }

  .side-actions { display: flex; gap: 6px; margin-bottom: 8px; }
  .side-btn {
    flex: 1; padding: 8px 10px; font-size: 14px; font-weight: bold;
    border: 0; border-radius: 5px; cursor: pointer; color: #fff;
  }
  .side-btn.add-wb    { background: #d40; }
  .side-btn.add-cam   { background: #06d; }
  .side-btn.add-cable { background: #a0a; }
  .side-btn.add-cable.mode-active { outline: 3px solid #fff; box-shadow: 0 0 0 2px #a0a; }
  .side-btn.undo    { background: #555; }
  .side-btn.undo:disabled { background: #ccc; cursor: not-allowed; }
  .side-btn.logo-upload {
    display: inline-block; background: #888; text-align: center;
    flex: 1; padding: 8px 10px; font-size: 13px;
  }
  .logo-box { margin-bottom: 10px; }
  #logoThumb {
    margin-top: 6px; display: flex; align-items: center; gap: 6px;
    background: #f5f5f5; padding: 4px; border-radius: 4px;
  }
  #logoThumb img { max-width: 80px; max-height: 40px; }
  #logoThumb button {
    background: transparent; color: #c33; border: 0;
    font-size: 18px; cursor: pointer;
  }
  #logoOverlay {
    position: absolute; top: 8px; right: 8px;
    width: 200px; height: 100px;
    background: rgba(255,255,255,0.92); padding: 4px;
    border: 1px solid #ccc; border-radius: 4px;
    pointer-events: none; z-index: 3;
    box-sizing: border-box; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #logoOverlay img {
    display: block; width: auto; height: auto;
    max-width: 100%; max-height: 100%;
    object-fit: contain;
  }
  textarea {
    width: 100%; height: 100px; margin-top: 10px; font-family: monospace; font-size: 11px;
  }
  .quick-names {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 6px;
    background: #fafafa; border-bottom: 1px solid #ddd;
  }
  .quick-names button {
    padding: 3px 8px; font-size: 12px; cursor: grab;
    background: #fff; border: 1px solid #b00; color: #b00; border-radius: 3px;
  }
  .quick-names button:active { cursor: grabbing; }
  .quick-names button.dragging { opacity: 0.4; }
  .canvas-wrap.drop-target { outline: 3px dashed #b00; outline-offset: -3px; }
  .modeLabel { padding: 4px 10px; background:#fff; color:#222; border-radius: 4px; font-size: 12px; }
  .empty-msg {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #888; font-size: 16px; gap: 12px;
  }
  .empty-msg .big { font-size: 22px; color: #444; font-weight: bold; }
  #pageSelector { padding: 2px 6px; font-size: 13px; }

  /* Wallbox contents panel */
  #contentsPanel {
    position: fixed;
    top: 0; right: 0;
    width: 320px; height: 100vh;
    background: #fff;
    border-left: 2px solid #b00;
    box-shadow: -4px 0 12px rgba(0,0,0,0.15);
    z-index: 100;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, "Arial Hebrew", Arial, sans-serif;
  }
  #contentsPanel[hidden] { display: none; }
  .cp-header {
    background: #b00; color: #fff;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .cp-header input.cp-name {
    flex: 1; padding: 6px 8px; font-size: 15px;
    border: 0; border-radius: 4px;
    background: rgba(255,255,255,0.95); color: #b00;
    font-weight: bold;
  }
  .cp-header button.cp-close {
    background: transparent; color: #fff; border: 0;
    font-size: 22px; cursor: pointer; padding: 0 4px;
  }
  .cp-body {
    flex: 1; overflow-y: auto;
    padding: 10px 12px;
  }
  .cp-empty {
    color: #666; font-style: italic; text-align: center;
    padding: 20px 0; font-size: 13px;
  }
  .cp-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 0; border-bottom: 1px solid #eee;
  }
  .cp-row .cp-item-name {
    flex: 1; padding: 4px 6px; font-size: 14px;
    border: 1px solid transparent; border-radius: 3px;
    background: transparent;
  }
  .cp-row .cp-item-name:focus, .cp-row .cp-item-name:hover {
    background: #fafafa; border-color: #ddd;
  }
  .cp-stepper { display: flex; align-items: center; gap: 2px; }
  .cp-stepper button {
    width: 24px; height: 24px; border: 1px solid #bbb;
    background: #f5f5f5; cursor: pointer; border-radius: 3px;
    font-size: 14px; padding: 0;
  }
  .cp-stepper input {
    width: 40px; text-align: center; padding: 4px 0;
    border: 1px solid #bbb; border-radius: 3px; font-size: 13px;
  }
  .cp-row .cp-remove {
    background: transparent; border: 0; color: #c33;
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  .cp-footer {
    padding: 10px 12px; border-top: 1px solid #ddd;
    background: #f8f8f8;
  }
  .cp-combobox { position: relative; }
  .cp-combobox input {
    width: 100%; padding: 8px 10px; font-size: 14px;
    border: 1px solid #bbb; border-radius: 4px;
  }
  .cp-combobox .cp-options {
    position: absolute; bottom: 100%; left: 0; right: 0;
    margin-bottom: 2px;
    background: #fff; border: 1px solid #bbb; border-radius: 4px;
    max-height: 180px; overflow-y: auto;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    z-index: 1;
  }
  .cp-combobox .cp-options div {
    padding: 6px 10px; cursor: pointer; font-size: 14px;
  }
  .cp-combobox .cp-options div:hover,
  .cp-combobox .cp-options div.cp-opt-active {
    background: #ffe5e5;
  }
  .cp-delete-wb {
    margin-top: 10px; width: 100%;
    background: #fff; color: #c33; border: 1px solid #c33;
    padding: 7px; border-radius: 4px; cursor: pointer;
    font-size: 13px;
  }
  .cp-delete-wb:hover { background: #fee; }

  /* Access gate */
  #authGate {
    position: fixed; inset: 0;
    background: #f0f0f0; z-index: 99999;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "Arial Hebrew", Arial, sans-serif;
  }
  #authGate .auth-box {
    background: #fff; padding: 36px 40px; border-radius: 10px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    text-align: center; min-width: 320px;
  }
  #authGate h1 { margin: 0 0 6px; font-size: 28px; color: #222; }
  #authGate .auth-sub { color: #888; font-size: 13px; margin-bottom: 22px; }
  #authGate #authMsg { color: #444; margin-bottom: 12px; font-size: 14px; }
  #authGate input {
    font-size: 18px; padding: 10px 12px; width: 240px;
    border: 1px solid #bbb; border-radius: 5px; text-align: center;
  }
  #authGate button {
    margin-top: 14px; font-size: 16px; padding: 10px 28px;
    background: #06b; color: #fff; border: 0; border-radius: 5px;
    cursor: pointer; font-weight: bold;
  }
  #authGate button:disabled { background: #aaa; cursor: not-allowed; }
  #authGate .auth-error { color: #c33; font-weight: bold; }

  /* Badge on WB marker */
  .marker.wb .qty-badge {
    position: absolute;
    top: -6px; right: -6px;
    background: #222; color: #fff;
    font-size: 10px; font-weight: bold;
    min-width: 16px; height: 16px;
    border-radius: 8px;
    border: 1.5px solid #fff;
    display: flex; align-items: center; justify-content: center;
    padding: 0 3px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="authGate">
  <div class="auth-box">
    <h1>BluePin</h1>
    <div class="auth-sub">כניסה לכלי סימון תכניות</div>
    <div id="authMsg">הזן סיסמה</div>
    <input id="authPass" type="password" autocomplete="current-password" />
    <div><button id="authBtn">כניסה</button></div>
  </div>
</div>

<header>
  <h1>BluePin – סימון תכניות</h1>
  <label class="fake-btn btn-upload">
    העלה PDF
    <input type="file" id="pdfInput" accept="application/pdf" style="display:none;">
  </label>
  <span class="modeLabel" id="modeLabel"></span>
  <button class="btn-render" id="btnRender">ייצא PDF</button>
  <button class="btn-clear"  id="btnClear">נקה הכל</button>
</header>

<div class="quick-names" id="quickNames">
  <strong style="align-self:center;margin-left:6px;">קליק על שם, או גרור ישירות לתכנית →</strong>
</div>

<main>

  <div class="panel">
    <h3>
      <span>תכנית – לחץ למיקום נקודה</span>
      <select id="pageSelector" style="display:none;"></select>
      <span id="pdfName" style="color:#666;font-weight:normal;"></span>
    </h3>
    <div id="zoomControls">
      <button data-z="0.3">30%</button>
      <button data-z="0.5">50%</button>
      <button data-z="0.75">75%</button>
      <button data-z="1.0">100%</button>
      <button data-z="1.5">150%</button>
      <button data-z="2.0">200%</button>
      <span id="origCoords" style="margin-right:auto;"></span>
    </div>
    <div class="canvas-wrap" id="origWrap">
      <div id="emptyMsg" class="empty-msg">
        <div class="big">אין תכנית טעונה</div>
        <div>לחץ "העלה PDF" בכותרת כדי להתחיל</div>
      </div>
      <div class="img-wrap" id="origImgWrap" style="display:none;">
        <img id="origImg" alt="תכנית">
        <svg id="cableLayer"></svg>
        <div id="logoOverlay" hidden><img alt="logo"></div>
      </div>
    </div>
  </div>

  <div class="legend-side">
    <div class="side-actions">
      <button class="side-btn add-wb"  id="quickAddWb"  title="הוסף Wallbox במרכז" aria-label="הוסף Wallbox">＋ WB</button>
      <button class="side-btn add-cam" id="quickAddCam" title="הוסף מצלמה במרכז" aria-label="הוסף מצלמה">＋ מצלמה</button>
    </div>
    <div class="side-actions">
      <button class="side-btn add-cable" id="sideCable" title="מצב כבל: קליק על שני מרקרים" aria-label="מצב כבל">↔ כבל</button>
    </div>
    <div class="side-actions">
      <button class="side-btn undo" id="btnUndo" title="בטל (Ctrl+Z)" aria-label="בטל" disabled>↶ בטל</button>
    </div>
    <div class="logo-box">
      <label class="side-btn logo-upload">
        העלה לוגו
        <input id="logoInput" type="file" accept="image/*" hidden>
      </label>
      <div id="logoThumb" hidden>
        <img alt="logo">
        <button id="btnLogoRemove" title="הסר לוגו" aria-label="הסר לוגו">×</button>
      </div>
    </div>
    <h3>הנקודות שסומנו</h3>
    <ul id="markerList"></ul>
  </div>

</main>

<aside id="contentsPanel" dir="rtl" hidden>
  <div class="cp-header">
    <input type="text" class="cp-name" placeholder="שם Wallbox" aria-label="שם Wallbox" />
    <button class="cp-close" title="סגור" aria-label="סגור">×</button>
  </div>
  <div class="cp-body">
    <div class="cp-empty">אין פריטים ב-Wallbox זה. הוסף פריט למטה.</div>
    <div class="cp-list"></div>
  </div>
  <div class="cp-footer">
    <div class="cp-combobox">
      <input type="text" class="cp-add" placeholder="+ הוסף פריט (BNC, XLR, ...)" aria-label="הוסף פריט" />
      <div class="cp-options" hidden></div>
    </div>
    <button class="cp-delete-wb">מחק Wallbox זה</button>
  </div>
</aside>

<script>
// --- Access gate ---
// Replace this URL with the "Raw" URL of your secret GitHub Gist that holds
// the access JSON. The Gist should contain a single file with this shape:
//   { "hash": "<sha256-of-password>", "active": true, "message": "..." }
// To change the password: edit the Gist. Clients pick up the change on next load.
const ACCESS_HASH_URL = 'REPLACE_WITH_GIST_RAW_URL';

(async function authGate() {
  const gate = document.getElementById('authGate');
  const msg  = document.getElementById('authMsg');
  const pass = document.getElementById('authPass');
  const btn  = document.getElementById('authBtn');

  async function sha256(s) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function setErr(t)  { msg.textContent = t; msg.classList.add('auth-error'); }
  function setInfo(t) { msg.textContent = t; msg.classList.remove('auth-error'); }

  // If user is editing locally with no URL set, skip the gate.
  if (ACCESS_HASH_URL === 'REPLACE_WITH_GIST_RAW_URL') {
    gate.remove();
    return;
  }

  let config;
  try {
    const res = await fetch(ACCESS_HASH_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    config = await res.json();
  } catch (e) {
    setErr('אין חיבור או שהשרת אינו זמין. רענן את הדף.');
    pass.disabled = true; btn.disabled = true;
    return;
  }

  if (config.active === false) {
    setErr(config.message || 'הכניסה מבוטלת זמנית. צור קשר עם בעל הכלי.');
    pass.disabled = true; btn.disabled = true;
    return;
  }

  // Auto-unlock if the cached hash still matches the current config.
  if (localStorage.getItem('bluepin_auth_hash') === config.hash) {
    gate.remove();
    return;
  }

  async function tryLogin() {
    btn.disabled = true;
    const h = await sha256(pass.value);
    if (h === config.hash) {
      localStorage.setItem('bluepin_auth_hash', h);
      gate.remove();
    } else {
      setErr('סיסמה שגויה, נסה שוב');
      pass.value = '';
      pass.focus();
      btn.disabled = false;
    }
  }
  btn.onclick = tryLogin;
  pass.addEventListener('keypress', e => { if (e.key === 'Enter') tryLogin(); });
  pass.focus();
})();

// --- PDF.js worker ---
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const QUICK_NAMES = [
  "WB MAIN A", "WB MAIN B", "WB MAIN C", "WB Z", "WB M",
  "WB A", "WB B", "WB C", "WB D", "WB K",
  "WB F", "WB G", "WB H", "WB I",
  "WB E", "WB P", "WB T"
];

// --- State ---
const DEFAULT_CONTENT_ITEMS = ['Camera', 'BNC', 'XLR', 'Lemo', 'Coax', 'Network', 'Fiber LC', 'Fiber SC', 'Power Outlet'];
let mode = null; // 'wb' | 'cam' | 'cable' | null
let nextName = "";
let cableFromId = null;       // marker id selected as "from" while in cable mode
let pdfDoc = null;            // loaded PDF (pdfjs document proxy)
let currentPageNum = 1;
let origScale = 0.5;

const stored = JSON.parse(localStorage.getItem('bluepin_state') || 'null');
// migration: old format was an array of markers
let markers = [];
let cables = [];
let logo = null; // { data: 'data:image/...', w, h }
if (Array.isArray(stored)) {
  markers = stored;
} else if (stored && typeof stored === 'object') {
  markers = stored.markers || [];
  cables = stored.cables || [];
  logo = stored.logo || null;
}
// migration: ensure every WB has a contents array
for (const m of markers) {
  if (m.type === 'wb' && !Array.isArray(m.contents)) m.contents = [];
}
let undoStack = [];
const UNDO_LIMIT = 50;

// --- DOM refs ---
const origImg = document.getElementById('origImg');
const origImgWrap = document.getElementById('origImgWrap');
const emptyMsg = document.getElementById('emptyMsg');
const cableLayer = document.getElementById('cableLayer');
const markerList = document.getElementById('markerList');
const modeLabel = document.getElementById('modeLabel');
const origCoords = document.getElementById('origCoords');
const pageSelector = document.getElementById('pageSelector');
const pdfName = document.getElementById('pdfName');

// --- Quick names bar (click to set name, drag to place WB directly) ---
let dragName = null;
const qn = document.getElementById('quickNames');
QUICK_NAMES.forEach(name => {
  const b = document.createElement('button');
  b.textContent = name;
  b.draggable = true;
  b.onclick = () => { nextName = name; updateModeLabel(); };
  b.addEventListener('dragstart', e => {
    if (!pdfDoc) { e.preventDefault(); return; }
    dragName = name;
    b.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'copy';
    // setData is required for Firefox to start the drag
    e.dataTransfer.setData('text/plain', name);
  });
  b.addEventListener('dragend', () => {
    dragName = null;
    b.classList.remove('dragging');
    document.getElementById('origWrap').classList.remove('drop-target');
  });
  qn.appendChild(b);
});
const bCustom = document.createElement('button');
bCustom.textContent = "שם מותאם...";
bCustom.style.background = "#ffe";
bCustom.draggable = false;
bCustom.onclick = () => {
  const v = prompt("הקלד שם:", nextName || "WB ");
  if (v) { nextName = v; updateModeLabel(); }
};
qn.appendChild(bCustom);

// Drop zone on the plan
const origWrap = document.getElementById('origWrap');
origWrap.addEventListener('dragover', e => {
  if (!dragName) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  origWrap.classList.add('drop-target');
});
origWrap.addEventListener('dragleave', e => {
  if (e.target === origWrap) origWrap.classList.remove('drop-target');
});
origWrap.addEventListener('drop', e => {
  if (!dragName || !pdfDoc) return;
  e.preventDefault();
  origWrap.classList.remove('drop-target');
  const r = origImg.getBoundingClientRect();
  const x = (e.clientX - r.left) / origScale;
  const y = (e.clientY - r.top) / origScale;
  // ignore drops outside the actual image
  if (x < 0 || y < 0 || x > origImg.naturalWidth || y > origImg.naturalHeight) return;
  markers.push({ id: Date.now() + Math.random(), type: 'wb', name: dragName, x, y, contents: [] });
  save();
});

// cable-mode (legacy click-based wiring) is no longer reachable from the toolbar —
// the only path to add cables is dragging from a camera's lens. cableFromId
// stays unused; mode remains null. Markers can still be cleaned via deleteMarker.

function updateModeLabel() {
  if (!pdfDoc) { modeLabel.textContent = ""; return; }
  if (mode === 'cable') {
    modeLabel.textContent = cableFromId == null
      ? "כבל: לחץ על נקודה ראשונה"
      : "כבל: לחץ על נקודה שנייה (Esc לביטול)";
  } else {
    modeLabel.textContent = "";
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !contentsPanel.hidden) {
    if (document.activeElement && document.activeElement.tagName === 'INPUT') {
      document.activeElement.blur();
      return;
    }
    closeContentsPanel();
    return;
  }
  if (e.key === 'Escape') {
    cableFromId = null;
    updateModeLabel();
    renderMarkers();
  }
});

// --- PDF upload + render ---
document.getElementById('pdfInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const arrayBuf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
  pdfName.textContent = '— ' + file.name;
  // page selector
  pageSelector.innerHTML = '';
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = 'דף ' + i;
    pageSelector.appendChild(opt);
  }
  pageSelector.style.display = pdfDoc.numPages > 1 ? '' : 'none';
  currentPageNum = 1;
  pageSelector.value = '1';
  await renderPdfPage(1);
  emptyMsg.style.display = 'none';
  origImgWrap.style.display = '';
  if (markers.length === 0 && cables.length === 0) seedStartingMarkers();
  updateModeLabel();
});

function seedStartingMarkers() {
  const W = origImg.naturalWidth, H = origImg.naturalHeight;
  if (!W || !H) return;
  const xs = [W * 0.25, W * 0.5, W * 0.75];
  for (let i = 0; i < 3; i++) {
    markers.push({ id: Date.now() + Math.random(), type: 'wb',  name: 'WB '  + (i+1), x: xs[i], y: H * 0.30, contents: [] });
    markers.push({ id: Date.now() + Math.random(), type: 'cam', name: 'Cam ' + (i+1), x: xs[i], y: H * 0.70, angle: 0 });
  }
  save();
}

pageSelector.addEventListener('change', async e => {
  currentPageNum = parseInt(e.target.value, 10);
  // wipe markers/cables when switching pages — they belong to a specific page geometry
  if (markers.length || cables.length) {
    if (!confirm("מעבר לדף אחר ינקה את הסימונים הנוכחיים. להמשיך?")) {
      pageSelector.value = String(currentPageNum); // revert UI
      return;
    }
    markers = []; cables = []; save();
  }
  await renderPdfPage(currentPageNum);
});

async function renderPdfPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  // render at 2x for crispness
  const viewport = page.getViewport({ scale: 2.0 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
  origImg.src = canvas.toDataURL('image/png');
  await new Promise(res => { origImg.onload = res; });
  applyZoom();
}

// --- Zoom ---
function applyZoom() {
  if (!origImg.naturalWidth) return;
  const w = origImg.naturalWidth * origScale;
  const h = origImg.naturalHeight * origScale;
  origImg.style.width = w + 'px';
  cableLayer.setAttribute('width', w);
  cableLayer.setAttribute('height', h);
  cableLayer.style.width = w + 'px';
  cableLayer.style.height = h + 'px';
  renderMarkers();
}
document.getElementById('zoomControls').addEventListener('click', e => {
  if (e.target.dataset.z) { origScale = parseFloat(e.target.dataset.z); applyZoom(); }
});

origImg.addEventListener('mousemove', e => {
  if (!origImg.naturalWidth) return;
  const r = origImg.getBoundingClientRect();
  const x = Math.round((e.clientX - r.left) / origScale);
  const y = Math.round((e.clientY - r.top)  / origScale);
  origCoords.textContent = `קואורדינטה: (${x}, ${y}) | זום: ${(origScale*100)|0}%`;
});

// --- Click on plan: add marker or pick cable endpoint ---
origImgWrap.addEventListener('click', e => {
  if (!contentsPanel.hidden && !contentsPanel.contains(e.target)) {
    closeContentsPanel();
  }
});

// --- Render markers + cables ---
function renderMarkers() {
  origImgWrap.querySelectorAll('.marker').forEach(n => n.remove());
  for (const m of markers) {
    const el = document.createElement('div');
    el.className = 'marker ' + m.type;
    el.style.left = (m.x * origScale) + 'px';
    el.style.top  = (m.y * origScale) + 'px';
    el.dataset.id = m.id;

    if (m.type === 'cam') {
      el.innerHTML = cameraSvg(m.angle || 0);
      // rotation handle at lens tip (in marker-local coordinates)
      const rot = document.createElement('div');
      rot.className = 'rot-handle';
      const angleRad = (m.angle || 0) * Math.PI / 180;
      const r = 36; // distance from center
      rot.style.left = (22 + Math.cos(angleRad) * r - 6) + 'px';
      rot.style.top  = (22 + Math.sin(angleRad) * r - 6) + 'px';
      rot.addEventListener('mousedown', ev => startRotate(ev, m));
      el.appendChild(rot);
      // cable handle on the lens (drag to a WB to create cable)
      const cab = document.createElement('div');
      cab.className = 'cable-handle';
      cab.title = 'גרור ל-Wallbox כדי לחבר כבל';
      const lensR = 8; // distance from center to lens, in viewBox units (44px marker)
      cab.style.left = (22 + Math.cos(angleRad) * lensR - 7) + 'px';
      cab.style.top  = (22 + Math.sin(angleRad) * lensR - 7) + 'px';
      cab.addEventListener('mousedown', ev => startCableDrag(ev, m));
      el.appendChild(cab);
    }

    if (m.type === 'wb' && Array.isArray(m.contents) && m.contents.length) {
      const sumQty = m.contents.reduce((acc, c) => acc + (c.qty | 0), 0);
      if (sumQty > 0) {
        const badge = document.createElement('span');
        badge.className = 'qty-badge';
        badge.textContent = String(sumQty);
        badge.title = m.contents.map(c => `${c.name} ×${c.qty}`).join(', ');
        el.appendChild(badge);
      }
    }

    if (m.name) {
      const lbl = document.createElement('span');
      lbl.className = 'label';
      lbl.textContent = m.name;
      el.appendChild(lbl);
    }
    const x = document.createElement('span');
    x.className = 'x';
    x.textContent = '×';
    x.onclick = (ev) => {
      ev.stopPropagation();
      deleteMarker(m.id);
    };
    el.appendChild(x);

    if (mode === 'cable' && cableFromId === m.id) el.classList.add('cable-from');

    el.addEventListener('mousedown', startDrag);
    el.addEventListener('click', ev => {
      if (ev.target.classList.contains('x')) return;
      if (ev.target.classList.contains('rot-handle')) return;
      if (mode === 'cable') { handleCableClick(m.id); return; }
      if (mode == null && m.type === 'wb') {
        ev.stopPropagation();
        openContentsPanel(m.id);
      }
    });
    if (m.type === 'wb') {
      el.addEventListener('dblclick', ev => {
        ev.preventDefault();
        ev.stopPropagation();
        openContentsPanel(m.id, true);
      });
    }
    origImgWrap.appendChild(el);
  }
  renderCables();
  renderList();
}

function cameraSvg(angleDeg) {
  // Body (square), lens (circle), viewing cone (path) — all centered in 44×44 viewBox
  // angle 0 = lens to the right
  return `
    <svg viewBox="0 0 44 44" style="transform: rotate(${angleDeg}deg);">
      <!-- viewing cone -->
      <path d="M22,22 L44,8 L44,36 Z" fill="rgba(0,90,220,0.18)" stroke="rgba(0,90,220,0.4)" stroke-width="1"/>
      <!-- camera body -->
      <rect x="6" y="12" width="20" height="20" rx="3" fill="#06b" stroke="#fff" stroke-width="1.5"/>
      <!-- lens -->
      <circle cx="30" cy="22" r="7" fill="#222" stroke="#fff" stroke-width="1.5"/>
      <circle cx="30" cy="22" r="3" fill="#06d"/>
    </svg>
  `;
}

function renderCables() {
  cableLayer.innerHTML = '';
  for (const c of cables) {
    const a = markers.find(m => m.id === c.fromId);
    const b = markers.find(m => m.id === c.toId);
    if (!a || !b) continue;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.x * origScale);
    line.setAttribute('y1', a.y * origScale);
    line.setAttribute('x2', b.x * origScale);
    line.setAttribute('y2', b.y * origScale);
    line.dataset.id = c.id;
    line.addEventListener('click', ev => {
      ev.stopPropagation();
      if (confirm("למחוק את הכבל?")) {
        cables = cables.filter(cc => cc.id !== c.id);
        save();
      }
    });
    cableLayer.appendChild(line);
  }
}

function handleCableClick(id) {
  if (cableFromId == null) {
    cableFromId = id;
    updateModeLabel();
    renderMarkers();
    return;
  }
  if (cableFromId === id) {
    cableFromId = null;
    updateModeLabel();
    renderMarkers();
    return;
  }
  // create cable
  cables.push({ id: Date.now() + Math.random(), fromId: cableFromId, toId: id });
  cableFromId = null;
  save();
  updateModeLabel();
}

function deleteMarker(id) {
  markers = markers.filter(m => m.id !== id);
  cables = cables.filter(c => c.fromId !== id && c.toId !== id);
  save();
}

function startDrag(e) {
  if (e.target.classList.contains('x')) return;
  if (e.target.classList.contains('rot-handle')) return;
  if (e.target.classList.contains('cable-handle')) return;
  if (mode === 'cable') return; // cable mode uses clicks, not drags
  const id = parseFloat(this.dataset.id);
  const m = markers.find(mm => mm.id === id);
  if (!m) return;
  const startX = e.clientX, startY = e.clientY;
  const origX = m.x, origY = m.y;
  let moved = false;
  function move(ev) {
    moved = true;
    m.x = origX + (ev.clientX - startX) / origScale;
    m.y = origY + (ev.clientY - startY) / origScale;
    renderMarkers();
  }
  function up() {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    if (moved) save();
  }
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
  e.preventDefault();
}

function startRotate(e, m) {
  e.stopPropagation();
  e.preventDefault();
  function move(ev) {
    const r = origImg.getBoundingClientRect();
    const mx = (ev.clientX - r.left) / origScale;
    const my = (ev.clientY - r.top)  / origScale;
    const dx = mx - m.x;
    const dy = my - m.y;
    m.angle = Math.atan2(dy, dx) * 180 / Math.PI;
    renderMarkers();
  }
  function up() {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    save();
  }
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

function startCableDrag(e, cam) {
  e.stopPropagation();
  e.preventDefault();
  const preview = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  preview.setAttribute('x1', cam.x * origScale);
  preview.setAttribute('y1', cam.y * origScale);
  preview.setAttribute('x2', cam.x * origScale);
  preview.setAttribute('y2', cam.y * origScale);
  preview.setAttribute('stroke', '#a0a');
  preview.setAttribute('stroke-width', '3');
  preview.setAttribute('stroke-dasharray', '6 4');
  preview.style.pointerEvents = 'none';
  cableLayer.appendChild(preview);
  let hoveredWb = null;
  function move(ev) {
    const r = origImg.getBoundingClientRect();
    preview.setAttribute('x2', ev.clientX - r.left);
    preview.setAttribute('y2', ev.clientY - r.top);
    const wbEl = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.marker.wb');
    if (hoveredWb && hoveredWb !== wbEl) hoveredWb.classList.remove('cable-target');
    if (wbEl && wbEl !== hoveredWb) wbEl.classList.add('cable-target');
    hoveredWb = wbEl;
  }
  function up(ev) {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    preview.remove();
    if (hoveredWb) hoveredWb.classList.remove('cable-target');
    let wbId = null;
    const wbEl = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.marker.wb');
    if (wbEl) {
      wbId = parseFloat(wbEl.dataset.id);
      if (wbId === cam.id) return; // safety
    } else {
      // empty space inside canvas → create a new WB there
      const overImg = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('#origImgWrap');
      if (!overImg) return; // dropped outside canvas — cancel
      const r = origImg.getBoundingClientRect();
      const x = (ev.clientX - r.left) / origScale;
      const y = (ev.clientY - r.top)  / origScale;
      const newId = Date.now() + Math.random();
      const name = 'WB ' + (markers.filter(m => m.type === 'wb').length + 1);
      markers.push({ id: newId, type: 'wb', name, x, y, contents: [] });
      wbId = newId;
    }
    if (cables.some(c =>
      (c.fromId === cam.id && c.toId === wbId) ||
      (c.fromId === wbId && c.toId === cam.id)
    )) { save(); return; }
    cables.push({ id: Date.now() + Math.random(), fromId: cam.id, toId: wbId });
    save();
  }
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

// --- List sidebar ---
function renderList() {
  markerList.innerHTML = '';
  const wbs  = markers.filter(m => m.type === 'wb');
  const cams = markers.filter(m => m.type === 'cam');
  if (wbs.length)  renderSection('Wallboxים', 'wb',  wbs);
  if (cams.length) renderSection('מצלמות',    'cam', cams);
}

function renderSection(title, type, list) {
  const header = document.createElement('li');
  header.className = 'section-header ' + (type === 'wb' ? 'sh-wb' : 'sh-cam');
  header.textContent = `${title} (${list.length})`;
  markerList.appendChild(header);
  for (const m of list) markerList.appendChild(buildMarkerCard(m));
}

function buildMarkerCard(m) {
  const card = document.createElement('li');
  card.className = 'marker-card ' + (m.type === 'wb' ? 'wb-card' : 'cam-card');

  const head = document.createElement('div');
  head.className = 'card-head';

  const name = document.createElement('div');
  name.className = 'name';
  name.textContent = m.name || '(ללא שם)';
  head.appendChild(name);

  const meta = document.createElement('div');
  meta.className = 'meta';
  let metaText = `(${m.x|0},${m.y|0})`;
  if (m.type === 'cam' && m.angle != null) metaText += ` ${m.angle|0}°`;
  meta.textContent = metaText;
  head.appendChild(meta);

  const actions = document.createElement('div');
  actions.className = 'actions';

  const renameBtn = document.createElement('button');
  renameBtn.textContent = '✎';
  renameBtn.title = 'שנה שם';
  renameBtn.onclick = () => {
    if (m.type === 'wb') {
      openContentsPanel(m.id, true);
    } else {
      const v = prompt("שנה שם:", m.name);
      if (v != null) { m.name = v; save(); renderMarkers(); renderList(); }
    }
  };
  actions.appendChild(renameBtn);

  const delBtn = document.createElement('button');
  delBtn.textContent = '✕';
  delBtn.title = 'מחק';
  delBtn.onclick = () => deleteMarker(m.id);
  actions.appendChild(delBtn);

  head.appendChild(actions);
  card.appendChild(head);

  if (m.type === 'wb') {
    const list = document.createElement('ul');
    list.className = 'contents-list';
    const items = m.contents || [];
    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty';
      li.textContent = '— ריק —';
      list.appendChild(li);
    } else {
      for (const it of items) {
        const li = document.createElement('li');
        const nameSpan = document.createElement('span');
        nameSpan.className = 'item-name';
        nameSpan.textContent = it.name;
        const qtySpan = document.createElement('span');
        qtySpan.className = 'item-qty';
        qtySpan.textContent = '×' + it.qty;
        li.append(nameSpan, qtySpan);
        list.appendChild(li);
      }
    }
    card.appendChild(list);
  }

  return card;
}

function save() {
  const prev = localStorage.getItem('bluepin_state');
  if (prev) {
    undoStack.push(prev);
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    updateUndoBtn();
  }
  localStorage.setItem('bluepin_state', JSON.stringify({ markers, cables, logo }));
  renderMarkers();
}

function undo() {
  if (undoStack.length === 0) return;
  const prev = undoStack.pop();
  localStorage.setItem('bluepin_state', prev);
  const data = JSON.parse(prev);
  markers = data.markers || [];
  cables  = data.cables  || [];
  logo    = data.logo    || null;
  for (const m of markers) if (m.type === 'wb' && !Array.isArray(m.contents)) m.contents = [];
  closeContentsPanel();
  renderMarkers();
  renderList();
  updateLogoPreview();
  updateUndoBtn();
}

function updateUndoBtn() {
  const btn = document.getElementById('btnUndo');
  if (btn) btn.disabled = undoStack.length === 0;
}

// --- Clear ---
document.getElementById('btnClear').onclick = () => {
  if (confirm("למחוק את כל הנקודות והכבלים?")) {
    markers = []; cables = []; save();
  }
};
document.getElementById('btnRender').onclick = () => {
  renderFinal().catch(err => alert("שגיאת ייצוא PDF: " + (err.message || err)));
};

// --- Quick-add buttons (side panel) ---
function addQuickMarker(type) {
  if (!origImg.naturalWidth) { alert("העלה PDF תחילה"); return; }
  const W = origImg.naturalWidth, H = origImg.naturalHeight;
  // small random offset so a stack of clicks doesn't pile on the exact center
  const jitter = () => (Math.random() - 0.5) * 60;
  const m = { id: Date.now() + Math.random(), type, name: '', x: W/2 + jitter(), y: H/2 + jitter() };
  if (type === 'wb')  { m.name = 'WB ' + (markers.filter(x => x.type === 'wb').length + 1);  m.contents = []; }
  if (type === 'cam') { m.name = 'Cam ' + (markers.filter(x => x.type === 'cam').length + 1); m.angle = 0; }
  markers.push(m);
  save();
}
document.getElementById('quickAddWb').onclick  = () => addQuickMarker('wb');
document.getElementById('quickAddCam').onclick = () => addQuickMarker('cam');

// Cable mode toggle (click two markers to connect)
document.getElementById('sideCable').onclick = () => {
  mode = (mode === 'cable') ? null : 'cable';
  cableFromId = null;
  document.getElementById('sideCable').classList.toggle('mode-active', mode === 'cable');
  updateModeLabel();
  renderMarkers();
};

// --- Undo ---
document.getElementById('btnUndo').onclick = undo;
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return; // let native undo work in fields
    e.preventDefault();
    undo();
  }
});

// --- Logo ---
const logoOverlay = document.getElementById('logoOverlay');
const logoThumb   = document.getElementById('logoThumb');
function updateLogoPreview() {
  if (logo && logo.data) {
    logoOverlay.querySelector('img').src = logo.data;
    logoOverlay.hidden = false;
    logoThumb.querySelector('img').src = logo.data;
    logoThumb.hidden = false;
  } else {
    logoOverlay.hidden = true;
    logoThumb.hidden = true;
  }
}
document.getElementById('logoInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      logo = { data: reader.result, w: img.naturalWidth, h: img.naturalHeight };
      save();
      updateLogoPreview();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(f);
  e.target.value = ''; // allow re-uploading same file later
});
document.getElementById('btnLogoRemove').onclick = () => {
  logo = null;
  save();
  updateLogoPreview();
};
updateLogoPreview();
updateUndoBtn();

// --- Final composed PNG ---
async function renderFinal() {
  if (!origImg.naturalWidth) { alert("העלה PDF תחילה"); return; }
  const W = origImg.naturalWidth;
  const H = origImg.naturalHeight;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  ctx.drawImage(origImg, 0, 0, W, H);

  // cables first (under markers)
  ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
  for (const c of cables) {
    const a = markers.find(m => m.id === c.fromId);
    const b = markers.find(m => m.id === c.toId);
    if (!a || !b) continue;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  // cameras
  for (const m of markers.filter(mm => mm.type === 'cam')) {
    drawCameraOnCanvas(ctx, m);
    if (m.name) drawLabel(ctx, m.name, m.x + 40, m.y + 30, '#06b');
  }
  // WBs (red)
  for (const m of markers.filter(mm => mm.type === 'wb')) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(220,20,20,1)';
    ctx.lineWidth = 6;
    ctx.arc(m.x, m.y, 22, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.fillStyle = 'rgba(220,20,20,1)';
    ctx.arc(m.x, m.y, 6, 0, Math.PI*2);
    ctx.fill();
    if (m.name) drawLabel(ctx, m.name, m.x + 28, m.y, '#b00');
  }

  // logo (top-right of main page)
  if (logo && logo.data) {
    const img = await loadImg(logo.data);
    const maxW = Math.min(W * 0.18, 400), maxH = Math.min(H * 0.12, 200);
    const s = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
    const lw = img.naturalWidth * s, lh = img.naturalHeight * s;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillRect(W - lw - 30, 18, lw + 16, lh + 12);
    ctx.drawImage(img, W - lw - 22, 24, lw, lh);
    ctx.restore();
  }

  if (!window.jspdf || !window.jspdf.jsPDF) {
    alert("ספריית ה-PDF לא נטענה. בדוק את החיבור לאינטרנט ורענן.");
    return;
  }
  const { jsPDF } = window.jspdf;
  const orientation = W >= H ? 'landscape' : 'portrait';
  const pdf = new jsPDF({ orientation, unit: 'mm', format: 'a4' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 3;
  const fitW = pageW - margin * 2;
  const fitH = pageH - margin * 2;
  const s = Math.min(fitW / W, fitH / H);
  const drawW = W * s, drawH = H * s;
  const dataURL = canvas.toDataURL('image/jpeg', 0.92);
  pdf.addImage(dataURL, 'JPEG', (pageW - drawW)/2, (pageH - drawH)/2, drawW, drawH);

  // second page: WB contents (canvas-rendered for Hebrew)
  const wbs = markers.filter(m => m.type === 'wb');
  if (wbs.length) {
    const pageCanvas = renderContentsPage(wbs, W, H);
    pdf.addPage('a4', orientation);
    const pdataURL = pageCanvas.toDataURL('image/jpeg', 0.92);
    const ps = Math.min(fitW / W, fitH / H);
    pdf.addImage(pdataURL, 'JPEG', (pageW - W*ps)/2, (pageH - H*ps)/2, W*ps, H*ps);
  }

  pdf.save('bluepin-plan.pdf');
}

function loadImg(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function renderContentsPage(wbs, W, H) {
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);

  // title
  ctx.direction = 'rtl';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#222';
  ctx.font = 'bold 42px Arial';
  ctx.fillText('תכולת Wallboxes', W - 60, 80);
  ctx.font = '20px Arial';
  ctx.fillStyle = '#666';
  ctx.fillText(new Date().toLocaleDateString('he-IL'), W - 60, 115);

  // columns layout
  const cols = wbs.length > 8 ? 2 : 1;
  const colW = (W - 120) / cols;
  let col = 0, y = 170;
  const lineH = 28;
  const blockGap = 30;

  ctx.font = '22px Arial';
  for (const wb of wbs) {
    const colX = W - 60 - col * colW;
    const items = wb.contents || [];
    const blockH = lineH * 2 + items.length * lineH + blockGap;
    if (y + blockH > H - 60 && col < cols - 1) { col++; y = 170; }

    // WB header
    ctx.fillStyle = '#b00';
    ctx.font = 'bold 26px Arial';
    ctx.fillText(wb.name || '(ללא שם)', colX, y);
    y += lineH;

    // items or empty
    ctx.font = '20px Arial';
    if (items.length === 0) {
      ctx.fillStyle = '#999';
      ctx.fillText('— אין פריטים —', colX - 20, y);
      y += lineH;
    } else {
      ctx.fillStyle = '#222';
      for (const it of items) {
        ctx.fillText(`• ${it.name} ×${it.qty}`, colX - 20, y);
        y += lineH;
      }
    }
    y += blockGap;
  }
  return canvas;
}

function drawCameraOnCanvas(ctx, m) {
  const angleRad = (m.angle || 0) * Math.PI / 180;
  ctx.save();
  ctx.translate(m.x, m.y);
  ctx.rotate(angleRad);
  // viewing cone
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(34, -14);
  ctx.lineTo(34, 14);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,90,220,0.18)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,90,220,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // body
  ctx.fillStyle = '#06b';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  if (ctx.roundRect) {
    ctx.beginPath();
    ctx.roundRect(-16, -10, 20, 20, 3);
  } else {
    ctx.beginPath();
    ctx.rect(-16, -10, 20, 20);
  }
  ctx.fill(); ctx.stroke();
  // lens
  ctx.beginPath();
  ctx.fillStyle = '#222';
  ctx.arc(8, 0, 7, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.fillStyle = '#06d';
  ctx.arc(8, 0, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawLabel(ctx, text, x, y, color) {
  ctx.font = "bold 22px 'Arial Hebrew', Arial, sans-serif";
  const m = ctx.measureText(text);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillRect(x - 4, y - 14, m.width + 8, 28);
  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

// --- Contents panel ---
let openContentsWbId = null;
const contentsPanel = document.getElementById('contentsPanel');
const cpNameInput   = contentsPanel.querySelector('.cp-name');
const cpCloseBtn    = contentsPanel.querySelector('.cp-close');
const cpDeleteBtn   = contentsPanel.querySelector('.cp-delete-wb');
const cpList        = contentsPanel.querySelector('.cp-list');
const cpEmpty       = contentsPanel.querySelector('.cp-empty');
const cpAddInput    = contentsPanel.querySelector('.cp-add');
const cpOptions     = contentsPanel.querySelector('.cp-options');

function openContentsPanel(wbId, focusName = false) {
  const m = markers.find(mm => mm.id === wbId && mm.type === 'wb');
  if (!m) return;
  openContentsWbId = wbId;
  cpNameInput.value = m.name || '';
  contentsPanel.hidden = false;
  renderContentsList();
  if (focusName) cpNameInput.focus();
}

function closeContentsPanel() {
  openContentsWbId = null;
  contentsPanel.hidden = true;
  cpOptions.hidden = true;
  cpAddInput.value = '';
}

cpCloseBtn.onclick = closeContentsPanel;

cpNameInput.addEventListener('change', () => {
  const m = getOpenWb();
  if (!m) return;
  m.name = cpNameInput.value.trim();
  save();
  renderMarkers();
  renderList();
});

cpDeleteBtn.onclick = () => {
  if (openContentsWbId == null) return;
  const id = openContentsWbId;
  closeContentsPanel();
  deleteMarker(id);
};

function getOpenWb() {
  return markers.find(m => m.id === openContentsWbId && m.type === 'wb');
}

function renderContentsList() {
  const m = getOpenWb();
  cpList.innerHTML = '';
  if (!m) return;
  const items = m.contents || [];
  cpEmpty.style.display = items.length === 0 ? 'block' : 'none';
  items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'cp-row';

    const nameIn = document.createElement('input');
    nameIn.type = 'text';
    nameIn.className = 'cp-item-name';
    nameIn.value = item.name;
    nameIn.setAttribute('aria-label', 'שם פריט');
    nameIn.onchange = () => updateContentItem(idx, { name: nameIn.value.trim() || item.name });

    const stepper = document.createElement('div');
    stepper.className = 'cp-stepper';
    const minus = document.createElement('button');
    minus.textContent = '−';
    minus.setAttribute('aria-label', 'הפחת כמות');
    minus.onclick = () => updateContentItem(idx, { qty: Math.max(1, (item.qty | 0) - 1) });
    const qtyIn = document.createElement('input');
    qtyIn.type = 'number';
    qtyIn.min = '1';
    qtyIn.value = item.qty;
    qtyIn.setAttribute('aria-label', 'כמות');
    qtyIn.onchange = () => updateContentItem(idx, { qty: Math.max(1, parseInt(qtyIn.value, 10) || 1) });
    const plus = document.createElement('button');
    plus.textContent = '+';
    plus.setAttribute('aria-label', 'הוסף כמות');
    plus.onclick = () => updateContentItem(idx, { qty: (item.qty | 0) + 1 });
    stepper.append(minus, qtyIn, plus);

    const rm = document.createElement('button');
    rm.className = 'cp-remove';
    rm.textContent = '×';
    rm.title = 'מחק פריט';
    rm.setAttribute('aria-label', 'מחק פריט');
    rm.onclick = () => removeContentItem(idx);

    row.append(nameIn, stepper, rm);
    cpList.appendChild(row);
  });
}

function addContentItem(name, qty = 1) {
  const m = getOpenWb();
  if (!m) return;
  if (!Array.isArray(m.contents)) m.contents = [];
  m.contents.push({ name: name.trim(), qty: Math.max(1, qty | 0) });
  save();
  renderContentsList();
  renderMarkers();
}

function updateContentItem(idx, patch) {
  const m = getOpenWb();
  if (!m || !m.contents[idx]) return;
  Object.assign(m.contents[idx], patch);
  save();
  renderContentsList();
  renderMarkers();
}

function removeContentItem(idx) {
  const m = getOpenWb();
  if (!m || !m.contents[idx]) return;
  m.contents.splice(idx, 1);
  save();
  renderContentsList();
  renderMarkers();
}

let cpOptActiveIdx = -1;

function cpRenderOptions() {
  const m = getOpenWb();
  const used = new Set((m?.contents || []).map(c => c.name.toLowerCase()));
  const q = cpAddInput.value.trim().toLowerCase();
  const matches = DEFAULT_CONTENT_ITEMS
    .filter(name => !used.has(name.toLowerCase()))
    .filter(name => q === '' || name.toLowerCase().startsWith(q));
  cpOptions.innerHTML = '';
  if (matches.length === 0) { cpOptions.hidden = true; cpOptActiveIdx = -1; return; }
  matches.forEach((name, i) => {
    const opt = document.createElement('div');
    opt.textContent = name;
    if (i === cpOptActiveIdx) opt.classList.add('cp-opt-active');
    opt.onmousedown = (ev) => {
      ev.preventDefault();
      addContentItem(name);
      cpAddInput.value = '';
      cpRenderOptions();
    };
    cpOptions.appendChild(opt);
  });
  cpOptions.hidden = false;
}

cpAddInput.addEventListener('focus', () => { cpOptActiveIdx = -1; cpRenderOptions(); });
cpAddInput.addEventListener('input', () => { cpOptActiveIdx = -1; cpRenderOptions(); });
cpAddInput.addEventListener('blur',  () => { setTimeout(() => { cpOptions.hidden = true; }, 120); });
cpAddInput.addEventListener('keydown', (e) => {
  const opts = Array.from(cpOptions.querySelectorAll('div'));
  if (e.key === 'ArrowDown') {
    cpOptActiveIdx = Math.min(opts.length - 1, cpOptActiveIdx + 1);
    cpRenderOptions();
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    cpOptActiveIdx = Math.max(-1, cpOptActiveIdx - 1);
    cpRenderOptions();
    e.preventDefault();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (cpOptActiveIdx >= 0 && opts[cpOptActiveIdx]) {
      addContentItem(opts[cpOptActiveIdx].textContent);
    } else if (cpAddInput.value.trim()) {
      addContentItem(cpAddInput.value);
    }
    cpAddInput.value = '';
    cpOptActiveIdx = -1;
    cpRenderOptions();
  } else if (e.key === 'Escape') {
    cpOptions.hidden = true;
    cpAddInput.value = '';
    cpOptActiveIdx = -1;
    e.preventDefault();
    e.stopPropagation();
  }
});

// --- Initial render ---
updateModeLabel();
renderMarkers();
</script>
